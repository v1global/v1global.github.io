<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>V1</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0a0a0a;
  font-family:'DM Mono', monospace;
  overflow:hidden;
  color:#ff7a2a;
  -webkit-tap-highlight-color: transparent;
  padding:20px;
}

/* layout */
.stage {
  display:flex;
  flex-direction:column;
  gap:16px;
  width:100%;
  max-width:360px;
}

/* chat */
.chat {
  display:flex;
  flex-direction:column;
  gap:6px;
}

.line {
  font-size:16px;
  line-height:1.4;
  opacity:0;
  transform:translateY(6px);
  transition:all .3s ease;
  text-align:left;
}

.line.show {
  opacity:1;
  transform:translateY(0);
}

.line.old {
  opacity:0.35;
}

/* hint */
.hint {
  font-size:13px;
  opacity:0.5;
  margin-top:4px;
}

/* address block */
.address-container {
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:8px;
  margin-top:12px;
  opacity:0;
  transition:opacity .3s ease;
}

.address-container.show {
  opacity:1;
}

.address {
  font-size:16px;
  font-weight:600;
  background:rgba(255,255,255,0.05);
  padding:12px 16px;
  border-radius:14px;
  word-break:break-all;
  color:#ff7a2a;
  user-select:text;
  width:100%;
}

/* copy button as bubble */
.copy {
  align-self:flex-start;
  padding:10px 18px;
  font-size:14px;
  border:none;
  border-radius:999px;
  background:#ff7a2a;
  color:#fff;
  cursor:pointer;
  transition:all .15s ease;
}

.copy:active {
  transform:scale(0.95);
}

.copy.done {
  background:#ffaa70;
}
</style>
</head>
<body>

<div class="stage">

  <div id="chat" class="chat"></div>

  <div id="hint" class="hint">tap →</div>

  <div id="addressBlock" class="address-container">
    <div id="address" class="address"></div>
    <button id="copyBtn" class="copy">copy</button>
  </div>

</div>

<script>
const ADDR = "D2tHP8E4ckTr3hq7sJiM6aHsMHTj4BPFUECecs7hWmx3";

const lines = [
  "what’s up.",
  "you found me.",
  "not many do.",
  "this is a solana address.",
  "if you want to send something...",
  "i’ll give it to you."
];

const chat = document.getElementById("chat");
const hint = document.getElementById("hint");
const addressBlock = document.getElementById("addressBlock");
const addressEl = document.getElementById("address");
const copyBtn = document.getElementById("copyBtn");

let step = 0;

function addLine(text) {
  const el = document.createElement("div");
  el.className = "line";
  el.textContent = text;
  chat.appendChild(el);

  setTimeout(() => el.classList.add("show"), 20);

  const all = document.querySelectorAll(".line");
  all.forEach((l, i) => {
    if (i < all.length - 1) l.classList.add("old");
  });
}

document.body.addEventListener("click", () => {
  if (step < lines.length) {
    addLine(lines[step]);
    step++;

    if (step === lines.length) {
      setTimeout(showFinal, 300);
    }
  }
});

function showFinal() {
  hint.style.display = "none";
  addressEl.textContent = ADDR;
  addressBlock.classList.add("show");
}

copyBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  navigator.clipboard.writeText(ADDR).then(() => {
    copyBtn.textContent = "copied.";
    copyBtn.classList.add("done");
  });
});
</script>

</body>
</html>
