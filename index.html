<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>V1</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'DM Mono', monospace;
  background:#ffffff;
  overflow:hidden;
  color:#1a1a1a;
}

/* ambient glow */
body::before {
  content:"";
  position:absolute;
  width:280px;
  height:280px;
  background:radial-gradient(circle, rgba(249,115,22,0.15), transparent 70%);
  animation:breathe 6s ease-in-out infinite;
}

@keyframes breathe {
  0%,100% { transform:scale(1); opacity:0.6; }
  50% { transform:scale(1.2); opacity:1; }
}

/* layout */
.stage {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:30px;
}

/* fox */
.fox-wrap {
  animation:float 5s ease-in-out infinite;
  transition:all .25s ease;
}

@keyframes float {
  0%,100% { transform:translateY(0); }
  50% { transform:translateY(-10px); }
}

body.engaged .fox-wrap {
  transform:scale(1.05);
  filter:drop-shadow(0 20px 60px rgba(249,115,22,0.4));
}

/* dialogue */
.dialogue {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:6px;
  font-size:14px;
  letter-spacing:0.08em;
}

.hidden {
  opacity:0;
  transform:translateY(6px);
  pointer-events:none;
}

.dialogue span {
  transition:all .4s ease;
}

/* CTA */
.cta {
  margin-top:10px;
  font-size:12px;
  letter-spacing:0.18em;
  padding:10px 20px;
  border:1px solid #F97316;
  color:#F97316;
  background:transparent;
  border-radius:2px;
  transition:all .2s ease;
}

.cta:active {
  transform:scale(0.96);
}

.cta.active {
  background:#F97316;
  color:#fff;
}

.address {
  font-size:10px;
  opacity:0.6;
  margin-top:6px;
  letter-spacing:0.12em;
}

/* fade in */
.fade-in {
  opacity:1 !important;
  transform:translateY(0) !important;
}
</style>
</head>

<body>

<div class="stage">

  <!-- FOX (unchanged SVG) -->
  <div class="fox-wrap">
    <!-- keep your exact SVG here -->
    <!-- (I’m keeping it short for clarity, paste your full fox SVG) -->
    <svg width="140" height="160" viewBox="0 0 200 230">
      <circle cx="100" cy="100" r="60" fill="#F97316"/>
    </svg>
  </div>

  <div class="dialogue">
    <span id="line1">what’s up?</span>
    <span id="line2" class="hidden">you found me.</span>
  </div>

  <button id="cta" class="cta hidden">send</button>
  <div id="address" class="address hidden">D2tH••••Wmx3</div>

</div>

<script>
const ADDR = "D2tHP8E4ckTr3hq7sJiM6aHsMHTj4BPFUECecs7hWmx3";

const line2 = document.getElementById("line2");
const cta = document.getElementById("cta");
const addr = document.getElementById("address");

setTimeout(() => {
  line2.classList.add("fade-in");
}, 1200);

let engaged = false;

document.body.addEventListener("click", () => {
  if (!engaged) {
    engaged = true;
    document.body.classList.add("engaged");

    cta.classList.remove("hidden");
    addr.classList.remove("hidden");

    setTimeout(() => {
      cta.classList.add("fade-in");
      addr.classList.add("fade-in");
    }, 100);
  }
});

/* CTA action */
cta.addEventListener("click", (e) => {
  e.stopPropagation();

  const universal = `https://phantom.app/ul/v1/send?to=${ADDR}`;
  const appScheme = `phantom://v1/send?to=${ADDR}`;
  const isMobile  = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

  cta.classList.add("active");

  if (isMobile) {
    window.location.href = appScheme;
    setTimeout(() => fallbackCopy(), 1200);
  } else {
    fallbackCopy();
    window.open(universal, "_blank");
  }
});

function fallbackCopy() {
  navigator.clipboard.writeText(ADDR).then(() => {
    cta.textContent = "copied";
    addr.textContent = ADDR;
  });
}
</script>

</body>
</html>
