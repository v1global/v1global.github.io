<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>V1</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#f5f5f5;
  font-family:'DM Mono', monospace;
  overflow:hidden;
  color:#ff7a2a;
  -webkit-tap-highlight-color: transparent;
  padding:20px;
}

.stage {
  display:flex;
  flex-direction:column;
  gap:16px;
  width:100%;
  max-width:360px;
  transform: translateY(20px);
}

.chat {
  display:flex;
  flex-direction:column;
  gap:6px;
}

.line {
  font-size:16px;
  line-height:1.4;
  opacity:0;
  transform:translateY(6px);
  transition:all .25s ease;
}

.line.show {
  opacity:1;
  transform:translateY(0);
}

.line.old {
  opacity:0.35;
}

.hint {
  font-size:14px;
  opacity:0.65;
  text-align:left;
  animation:pulse 1.6s infinite;
}

@keyframes pulse {
  0%,100% { opacity:0.6; }
  50% { opacity:0.9; }
}

.address-container {
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top:12px;
  opacity:0;
  transition:opacity .3s ease;
}

.address-container.show { opacity:1; }

.address {
  font-size:16px;
  font-weight:600;
  background:rgba(255,122,42,0.1);
  padding:12px 16px;
  border-radius:14px;
  word-break:break-all;
}

.copy {
  padding:10px 18px;
  font-size:14px;
  border:none;
  border-radius:999px;
  background:#ff7a2a;
  color:#fff;
  cursor:pointer;
}

.copy:active { transform:scale(0.95); }

.copy.done { background:#ffaa70; }

/* wallet zone */
.wallet-zone {
  position:fixed;
  bottom:40px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
}

.wallet-zone button {
  padding:8px 14px;
  font-size:13px;
  border:none;
  border-radius:999px;
  background:#ff7a2a;
  color:#fff;
  cursor:pointer;
  opacity:0;
  transform:translateY(10px);
  transition:all .3s ease;
}

.wallet-zone.show button {
  opacity:1;
  transform:translateY(0);
}
</style>
</head>
<body>

<div class="stage">
  <div id="chat" class="chat"></div>
  <div id="hint" class="hint">tap →</div>

  <div id="addressBlock" class="address-container">
    <div id="address" class="address"></div>
    <button id="copyBtn" class="copy">copy</button>
  </div>
</div>

<div id="walletZone" class="wallet-zone">
  <button id="phantomBtn">Open Phantom</button>
  <button id="metaBtn">Open MetaMask</button>
</div>

<script>
const ADDR = "D2tHP8E4ckTr3hq7sJiM6aHsMHTj4BPFUECecs7hWmx3";

const lines = [
  "what’s up.",
  "you found me.",
  "not many do.",
  "this is a solana address.",
  "if you want to send something...",
  "i’ll give it to you."
];

const chat = document.getElementById("chat");
const hint = document.getElementById("hint");
const addressBlock = document.getElementById("addressBlock");
const addressEl = document.getElementById("address");
const copyBtn = document.getElementById("copyBtn");
const walletZone = document.getElementById("walletZone");

let step = 0;
let typing = false;

/* FIXED typing effect */
function typeLine(text, done) {
  if (typing) return;
  typing = true;

  const el = document.createElement("div");
  el.className = "line";
  const textNode = document.createTextNode("");
  el.appendChild(textNode);
  chat.appendChild(el);

  let i = 0;

  function typeChar() {
    textNode.nodeValue += text.charAt(i);
    i++;

    if (i < text.length) {
      setTimeout(typeChar, 28); // tuned speed
    } else {
      el.classList.add("show");

      const all = document.querySelectorAll(".line");
      all.forEach((l, idx) => {
        if (idx < all.length - 1) l.classList.add("old");
      });

      typing = false;
      if (done) done();
    }
  }

  typeChar();
}

/* first line auto */
window.addEventListener("load", () => {
  setTimeout(() => {
    typeLine(lines[0]);
    step = 1;
  }, 200);
});

/* tap progression */
document.body.addEventListener("click", () => {
  if (typing) return;

  if (step < lines.length) {
    typeLine(lines[step]);
    step++;

    if (step === lines.length) {
      setTimeout(showFinal, 300);
    }
  }
});

/* final reveal */
function showFinal() {
  hint.style.display = "none";
  addressEl.textContent = ADDR;
  addressBlock.classList.add("show");

  setTimeout(() => {
    walletZone.classList.add("show");
  }, 400);
}

/* copy */
copyBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  navigator.clipboard.writeText(ADDR).then(() => {
    copyBtn.textContent = "copied.";
    copyBtn.classList.add("done");
  });
});

/* wallets */
document.getElementById("phantomBtn").onclick = () => {
  window.location.href = `https://phantom.app/ul/browse/${ADDR}`;
};

document.getElementById("metaBtn").onclick = () => {
  window.location.href = `https://metamask.app.link/send/${ADDR}`;
};
</script>

</body>
</html>
