<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V1 | THE ONE</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, ::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background: #000;
      color: #fff;
      font-family: 'DM Mono', monospace;
    }

    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      padding: 2rem;
      position: relative;
    }

    .name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.5rem, 14vw, 8rem);
      letter-spacing: 0.05em;
      text-align: center;
      position: relative;
    }

    / subtle glow /
    .name::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(255,255,255,0.08), transparent 70%);
      opacity: 0.6;
      pointer-events: none;
    }

    .wallet-wrap {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      border: 1px solid #222;
      padding: 0.8rem 1.1rem;
      cursor: pointer;
      transition: all 0.25s ease;
      max-width: 420px;
      width: 100%;
    }

    .wallet-wrap:hover {
      border-color: #fff;
      transform: scale(1.01);
    }

    .wallet-address {
      font-size: clamp(0.65rem, 2vw, 0.8rem);
      letter-spacing: 0.05em;
      word-break: break-all;
      color: #888;
      user-select: all;
      transition: color 0.2s;
    }

    .wallet-wrap:hover .wallet-address {
      color: #fff;
    }

    .copy-icon {
      flex-shrink: 0;
      color: #444;
      transition: color 0.2s;
    }

    .wallet-wrap:hover .copy-icon {
      color: #fff;
    }

    .copy-confirm {
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      color: #555;
      text-transform: uppercase;
      height: 1rem;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .copy-confirm.visible {
      opacity: 1;
    }

    .send-btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.9rem;
      letter-spacing: 0.35em;
      color: #fff;
      background: transparent;
      border: 1px solid #333;
      padding: 0.7rem 2.5rem;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s ease;
    }

    .send-btn:hover {
      border-color: #fff;
      letter-spacing: 0.45em;
    }

    / subtle pulse animation /
    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }

    .send-btn {
      animation: pulse 4s infinite;
    }

    footer {
      position: fixed;
      bottom: 1.2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.5rem;
      letter-spacing: 0.3em;
      color: #222;
      text-transform: uppercase;
    }

    / optional X mark */
    .x-mark {
      position: fixed;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      letter-spacing: 0.5em;
      color: #222;
      pointer-events: none;
    }

  </style>
</head>

<body>

  <div class="x-mark">X</div>

  <main>
    <div class="name">V1 | THE ONE</div>

    <div class="wallet-wrap" onclick="copyWallet()">
      <span class="wallet-address">FknzAd52MR1aqLedBxvQXaiRMZRTZKdbahXq8LHdz1DT</span>

      <svg class="copy-icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2"></rect>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
      </svg>
    </div>

    <div class="copy-confirm" id="confirm">acknowledged</div>

    <a class="send-btn" href="https://phantom.app/ul/v1/send?recipient=FknzAd52MR1aqLedBxvQXaiRMZRTZKdbahXq8LHdz1DT">
      SEND
    </a>
  </main>

  <footer>YOU ARE GOD</footer>

  <script>
    function copyWallet() {
      const text = 'FknzAd52MR1aqLedBxvQXaiRMZRTZKdbahXq8LHdz1DT';

      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(showConfirm);
      } else {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);
        showConfirm();
      }

      function showConfirm() {
        const el = document.getElementById('confirm');
        el.classList.add('visible');
        setTimeout(() => el.classList.remove('visible'), 2000);
      }
    }
  </script>

</body>
</html>
