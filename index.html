<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>V1</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#f5f5f5;
  font-family:'DM Mono', monospace;
  overflow:hidden;
  color:#ff7a2a;
}

/* ENTRY */
.entry {
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#f5f5f5;
  z-index:10;
  flex-direction:column;
}

.entry-text {
  font-size:34px;
  letter-spacing:0.2em;
  opacity:0;
  transform:scale(0.95);
  transition:all .6s ease;
}

.entry-text.show {
  opacity:1;
  transform:scale(1);
}

.entry.fade-out {
  opacity:0;
  transition:opacity .6s ease;
  pointer-events:none;
}

/* layout */
.stage {
  display:flex;
  flex-direction:column;
  gap:16px;
  width:100%;
  max-width:360px;
  transform: translateY(24px);
}

.chat { display:flex; flex-direction:column; gap:6px; }

.line { font-size:16px; }

.line.old { opacity:0.35; }

.line::after {
  content:"|";
  margin-left:2px;
  animation:blink 1s infinite;
}

.line.done::after { content:""; }

@keyframes blink {
  0%,100% { opacity:1; }
  50% { opacity:0; }
}

.hint {
  font-size:14px;
  opacity:0.7;
  animation:pulse 1.6s infinite;
}

@keyframes pulse {
  0%,100% { opacity:0.65; }
  50% { opacity:0.95; }
}

/* address */
.address-container {
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-top:12px;
  opacity:0;
  transition:opacity .3s ease;
}

.address-container.show { opacity:1; }

.address-label {
  font-size:12px;
  letter-spacing:0.14em;
  opacity:0.75;
  font-weight:500;
}

.address {
  font-size:15px;
  font-weight:600;
  background:rgba(255,122,42,0.12);
  padding:12px 16px;
  border-radius:14px;
  word-break:break-all;
}

/* copy button */
.copy {
  padding:10px 18px;
  font-size:14px;
  border:none;
  border-radius:999px;
  background:#ff7a2a;
  color:#fff;
  cursor:pointer;
  position:relative;
  overflow:hidden;
}

.copy:active { transform:scale(0.95); }

.copy.pop {
  animation:pop .25s ease;
}

@keyframes pop {
  0% { transform:scale(1); }
  50% { transform:scale(1.15); }
  100% { transform:scale(1); }
}

/* spark particles */
.spark {
  position:absolute;
  width:4px;
  height:4px;
  background:#ff7a2a;
  border-radius:50%;
  pointer-events:none;
  animation:spark .6s ease forwards;
}

@keyframes spark {
  to {
    transform:translate(var(--x), var(--y));
    opacity:0;
  }
}

/* wallet buttons */
.wallet-zone {
  position:fixed;
  bottom:32px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
}

.wallet-zone button {
  padding:8px 14px;
  font-size:13px;
  border:none;
  border-radius:999px;
  background:#ff7a2a;
  color:#fff;
  opacity:0;
  transform:translateY(10px);
  transition:.3s;
}

.wallet-zone.show button {
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<!-- ENTRY -->
<div id="entry" class="entry">
  <div id="entryText" class="entry-text">V1</div>
</div>

<div class="stage">
  <div id="chat" class="chat"></div>
  <div id="hint" class="hint">tap →</div>

  <div id="addressBlock" class="address-container">
    <div class="address-label">SOLANA ADDRESS</div>
    <div id="address" class="address"></div>
    <button id="copyBtn" class="copy">copy</button>
  </div>
</div>

<div id="walletZone" class="wallet-zone">
  <button id="phantomBtn">Open Phantom</button>
  <button id="metaBtn">Open MetaMask</button>
</div>

<script>
const ADDR = "D2tHP8E4ckTr3hq7sJiM6aHsMHTj4BPFUECecs7hWmx3";

const lines = [
  "what’s up.",
  "you found me.",
  "not many do.",
  "if you want to send something...",
  "i’ll give it to you."
];

const chat = document.getElementById("chat");
const hint = document.getElementById("hint");
const addressBlock = document.getElementById("addressBlock");
const addressEl = document.getElementById("address");
const copyBtn = document.getElementById("copyBtn");
const walletZone = document.getElementById("walletZone");

let step = 0;
let typing = false;

/* ENTRY SEQUENCE */
const entry = document.getElementById("entry");
const entryText = document.getElementById("entryText");

window.onload = () => {
  setTimeout(()=> entryText.classList.add("show"),100);

  setTimeout(()=>{
    entryText.textContent = "THE ONE";
  },1000);

  setTimeout(()=>{
    entry.classList.add("fade-out");
  },2000);

  setTimeout(()=>{
    startChat();
  },2400);
};

function startChat(){
  typeLine(lines[0]);
  step = 1;
}

/* typing */
function typeLine(text) {
  if (typing) return;
  typing = true;

  const el = document.createElement("div");
  el.className = "line";
  chat.appendChild(el);

  let i = 0;

  function tick() {
    el.textContent = text.slice(0, i+1);
    i++;
    if(i < text.length){
      setTimeout(tick, 20);
    } else {
      el.classList.add("done");
      document.querySelectorAll(".line").forEach((l,idx)=>{
        if(idx < document.querySelectorAll(".line").length-1) l.classList.add("old");
      });
      typing = false;
    }
  }
  tick();
}

/* tap */
document.body.addEventListener("click", ()=>{
  if (typing) return;

  if(step < lines.length){
    typeLine(lines[step]);
    step++;

    if(step === lines.length){
      setTimeout(()=>{
        hint.style.display="none";
        addressEl.textContent = ADDR;
        addressBlock.classList.add("show");
        walletZone.classList.add("show");
      },300);
    }
  }
});

/* COPY + SPARKS */
copyBtn.onclick = (e)=>{
  e.stopPropagation();

  navigator.clipboard.writeText(ADDR);

  copyBtn.classList.add("pop");

  for(let i=0;i<8;i++){
    const s = document.createElement("div");
    s.className="spark";
    s.style.setProperty("--x", (Math.random()*60-30)+"px");
    s.style.setProperty("--y", (Math.random()*60-30)+"px");
    copyBtn.appendChild(s);

    setTimeout(()=> s.remove(),600);
  }

  setTimeout(()=> copyBtn.classList.remove("pop"),250);
};

/* wallets */
document.getElementById("phantomBtn").onclick=()=>{
  window.location.href=`https://phantom.app/ul/browse/${ADDR}`;
};
document.getElementById("metaBtn").onclick=()=>{
  window.location.href=`https://metamask.app.link/send/${ADDR}`;
};
</script>

</body>
</html>
