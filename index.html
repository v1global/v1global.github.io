<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>V1</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#f5f5f5;
  font-family:'DM Mono', monospace;
  overflow:hidden;
  color:#ff7a2a;
  padding:20px;
}

/* ===== ENTRY SCREEN ===== */
.entry {
  position:fixed;
  inset:0;
  background:#f5f5f5;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:10;
  transition:opacity .6s ease;
}

.entry.hidden {
  opacity:0;
  pointer-events:none;
}

.entry-text {
  font-size:32px;
  letter-spacing:0.25em;
  opacity:0;
  transform:scale(0.95);
  animation:enter 1.2s ease forwards;
}

@keyframes enter {
  to {
    opacity:0.8;
    transform:scale(1);
  }
}

/* ===== MAIN ===== */
.stage {
  display:flex;
  flex-direction:column;
  gap:16px;
  width:100%;
  max-width:360px;
  transform:translateY(24px);
}

.chat { display:flex; flex-direction:column; gap:6px; }

.line { font-size:16px; }

.line.old { opacity:0.35; transition:.25s; }

.line::after {
  content:"|";
  animation:blink 1s infinite;
}

.line.done::after { content:""; }

@keyframes blink {
  0%,100%{opacity:1;}50%{opacity:0;}
}

.hint {
  font-size:14px;
  opacity:0.7;
  animation:pulse 1.6s infinite;
}

@keyframes pulse {
  0%,100%{opacity:0.6;}50%{opacity:0.95;}
}

/* address */
.address-container {
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-top:12px;
  opacity:0;
  transition:.3s;
}

.address-container.show { opacity:1; }

.address-label {
  font-size:12px;
  letter-spacing:0.14em;
  opacity:0.75;
  font-weight:500;
}

.address {
  font-size:15px;
  font-weight:600;
  background:rgba(255,122,42,0.12);
  padding:12px 16px;
  border-radius:14px;
  word-break:break-all;
}

/* ===== COPY BUTTON (dopamine) ===== */
.copy {
  padding:10px 18px;
  font-size:14px;
  border:none;
  border-radius:999px;
  background:#ff7a2a;
  color:#fff;
  cursor:pointer;
  align-self:flex-start;
  transition:transform .15s ease, box-shadow .2s ease;
}

.copy:active {
  transform:scale(0.95);
}

.copy.pop {
  animation:pop .35s ease;
}

@keyframes pop {
  0% { transform:scale(1); }
  40% { transform:scale(1.15); box-shadow:0 0 20px rgba(255,122,42,0.5); }
  100% { transform:scale(1); }
}

.copy.done {
  background:#ffaa70;
}

/* wallet */
.wallet-zone {
  position:fixed;
  bottom:32px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
}

.wallet-zone button {
  padding:8px 14px;
  font-size:13px;
  border:none;
  border-radius:999px;
  background:#ff7a2a;
  color:#fff;
  opacity:0;
  transform:translateY(10px);
  transition:.3s;
}

.wallet-zone.show button {
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<!-- ENTRY -->
<div id="entry" class="entry">
  <div class="entry-text">V1 | THE ONE</div>
</div>

<div class="stage">
  <div id="chat" class="chat"></div>
  <div id="hint" class="hint">tap →</div>

  <div id="addressBlock" class="address-container">
    <div class="address-label">SOLANA ADDRESS</div>
    <div id="address" class="address"></div>
    <button id="copyBtn" class="copy">copy</button>
  </div>
</div>

<div id="walletZone" class="wallet-zone">
  <button id="phantomBtn">Open Phantom</button>
  <button id="metaBtn">Open MetaMask</button>
</div>

<script>
const ADDR = "D2tHP8E4ckTr3hq7sJiM6aHsMHTj4BPFUECecs7hWmx3";

const lines = [
  "what’s up.",
  "you found me.",
  "not many do.",
  "if you want to send something...",
  "i’ll give it to you."
];

const entry = document.getElementById("entry");
const chat = document.getElementById("chat");
const hint = document.getElementById("hint");
const addressBlock = document.getElementById("addressBlock");
const addressEl = document.getElementById("address");
const copyBtn = document.getElementById("copyBtn");
const walletZone = document.getElementById("walletZone");

let step = 0;
let typing = false;
let started = false;

/* ENTRY TAP */
entry.addEventListener("click", () => {
  entry.classList.add("hidden");
  setTimeout(startFlow, 400);
});

function startFlow() {
  if (started) return;
  started = true;
  typeLine(lines[0]);
  step = 1;
}

/* typing */
function typeLine(text) {
  if (typing) return;
  typing = true;

  const el = document.createElement("div");
  el.className = "line";
  chat.appendChild(el);

  let i = 0;

  function tick() {
    el.textContent = text.slice(0, i+1);
    i++;
    if (i < text.length) {
      setTimeout(tick, 20);
    } else {
      el.classList.add("done");

      document.querySelectorAll(".line").forEach((l, idx, arr)=>{
        if(idx < arr.length-1) l.classList.add("old");
      });

      typing = false;
    }
  }
  tick();
}

/* taps */
document.body.addEventListener("click", () => {
  if (!started || typing) return;

  if (step < lines.length) {
    typeLine(lines[step]);
    step++;

    if (step === lines.length) {
      setTimeout(showFinal, 400);
    }
  }
});

/* final */
function showFinal() {
  hint.style.display="none";
  addressEl.textContent = ADDR;
  addressBlock.classList.add("show");
  setTimeout(()=> walletZone.classList.add("show"), 400);
}

/* COPY dopamine */
copyBtn.addEventListener("click", (e)=>{
  e.stopPropagation();

  navigator.clipboard.writeText(ADDR).then(()=>{
    copyBtn.textContent="copied.";
    copyBtn.classList.add("done");
    copyBtn.classList.add("pop");

    setTimeout(()=>{
      copyBtn.classList.remove("pop");
    }, 350);
  });
});

/* wallets */
phantomBtn.onclick = ()=> location.href=`https://phantom.app/ul/browse/${ADDR}`;
metaBtn.onclick = ()=> location.href=`https://metamask.app.link/send/${ADDR}`;
</script>

</body>
</html>
