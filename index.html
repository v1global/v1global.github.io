<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V1 | THE ONE</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background: #000;
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-weight: 300;
    }

    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.8rem;
      padding: 2rem;
    }

    .name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.5rem, 14vw, 8rem);
      letter-spacing: 0.05em;
      line-height: 1;
      text-align: center;
    }

    .wallet-wrap {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      border: 1px solid #222;
      padding: 0.85rem 1.1rem;
      cursor: pointer;
      transition: border-color 0.2s;
      max-width: 480px;
      width: 100%;
    }

    .wallet-wrap:hover {
      border-color: #fff;
    }

    .wallet-address {
      font-size: clamp(0.65rem, 2vw, 0.8rem);
      letter-spacing: 0.05em;
      word-break: break-all;
      color: #aaa;
      user-select: all;
      transition: color 0.2s;
    }

    .wallet-wrap:hover .wallet-address {
      color: #fff;
    }

    .copy-icon {
      flex-shrink: 0;
      color: #444;
      transition: color 0.2s;
    }

    .wallet-wrap:hover .copy-icon {
      color: #fff;
    }

    .copy-confirm {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      color: #555;
      text-transform: uppercase;
      height: 1rem;
      opacity: 0;
      transition: opacity 0.25s;
      text-align: center;
    }

    .copy-confirm.visible {
      opacity: 1;
    }

    .send-btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.3em;
      color: #000;
      background: #fff;
      border: none;
      padding: 0.8rem 2.8rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: opacity 0.2s;
    }

    .send-btn:hover {
      opacity: 0.85;
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.55rem;
      letter-spacing: 0.25em;
      color: #333;
      text-transform: uppercase;
    }
  </style>
</head>

<body>

  <main>
    <div class="name">V1 | THE ONE</div>

    <div class="wallet-wrap" onclick="copyWallet()" title="Copy address">
      <span class="wallet-address">D2tHP8E4ckTr3hq7sJiM6aHsMHTj4BPFUECecs7hWmx3</span>

      <svg class="copy-icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="9" width="13" height="13" rx="2"></rect>
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
      </svg>
    </div>

    <div class="copy-confirm" id="confirm">copied</div>

<a class="send-btn" href="https://phantom.app/ul/v1/send?recipient=D2tHP8E4ckTr3hq7sJiM6aHsMHTj4BPFUECecs7hWmx3"
   onclick="copyWallet()">
  CONTRIBUTE
</a>
  </main>

  <footer>solana network</footer>

  <script>
    function copyWallet() {
      const text = 'D2tHP8E4ckTr3hq7sJiM6aHsMHTj4BPFUECecs7hWmx3';

      if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(showConfirm);
      } else {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);
        showConfirm();
      }

      function showConfirm() {
        const el = document.getElementById('confirm');
        el.classList.add('visible');
        setTimeout(() => el.classList.remove('visible'), 2000);
      }
    }
  </script>

</body>
</html>
