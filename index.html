<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>V1</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#ffffff;
  font-family:'DM Mono', monospace;
  overflow:hidden;
  color:#1a1a1a;
  -webkit-tap-highlight-color: transparent;
}

/* ambient glow */
body::before {
  content:"";
  position:absolute;
  width:280px;
  height:280px;
  background:radial-gradient(circle, rgba(249,115,22,0.12), transparent 70%);
  animation:breathe 6s ease-in-out infinite;
  transition:all 0.35s ease;
}

body.done::before {
  transform:scale(1.45);
  opacity:0.3;
}

@keyframes breathe {
  0%,100% { transform:scale(1); opacity:0.6; }
  50% { transform:scale(1.2); opacity:1; }
}

/* layout */
.stage {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:26px;
  max-width:260px;
  text-align:center;
}

/* fox */
.fox {
  width:120px;
  height:120px;
  animation:float 5s ease-in-out infinite;
  transition:all .25s ease;
}

@keyframes float {
  0%,100% { transform:translateY(0); }
  50% { transform:translateY(-8px); }
}

body.engaged .fox {
  transform:scale(1.05);
}

body.done .fox {
  transform:scale(1.08);
}

/* chat */
.chat {
  display:flex;
  flex-direction:column;
  gap:6px;
}

.line {
  font-size:14px;
  opacity:0;
  transform:translateY(6px);
  transition:all .18s ease;
}

.line.show {
  opacity:1;
  transform:translateY(0);
}

.line.old {
  opacity:0.35;
}

/* hint */
.hint {
  font-size:11px;
  opacity:0.4;
  margin-top:6px;
}

/* address */
.address {
  font-size:11px;
  letter-spacing:0.12em;
  margin-top:10px;
  opacity:0;
  transform:translateY(6px);
  transition:all .25s ease;
  word-break:break-all;
}

.address.show {
  opacity:1;
  transform:translateY(0);
}

/* confirmation */
.copied {
  margin-top:12px;
  font-size:18px;
  letter-spacing:0.14em;
  color:#F97316;
  opacity:0;
  transform:scale(0.85);
}

/* stronger but controlled hit */
.copied.show {
  animation:confirm 0.5s cubic-bezier(.2,1.2,.3,1) forwards,
             pulse 1.4s ease-in-out infinite 0.5s;
}

@keyframes confirm {
  0%   { opacity:0; transform:scale(0.75); }
  60%  { opacity:1; transform:scale(1.12); }
  100% { opacity:1; transform:scale(1); }
}

@keyframes pulse {
  0%,100% { transform:scale(1); opacity:1; }
  50%     { transform:scale(1.05); opacity:0.85; }
}
</style>
</head>

<body>

<div class="stage">

  <!-- fox -->
  <svg class="fox" viewBox="0 0 100 100">
    <polygon points="50,10 90,80 10,80" fill="#F97316"/>
    <circle cx="35" cy="55" r="4" fill="#111"/>
    <circle cx="65" cy="55" r="4" fill="#111"/>
  </svg>

  <div id="chat" class="chat"></div>

  <div id="hint" class="hint">tap →</div>

  <div id="address" class="address"></div>
  <div id="copied" class="copied">copied.</div>

</div>

<script>
const ADDR = "D2tHP8E4ckTr3hq7sJiM6aHsMHTj4BPFUECecs7hWmx3";

const lines = [
  "what’s up.",
  "you found me.",
  "not many do.",
  "it’s a solana address.",
  "if you want to send something...",
  "i’ll give it to you."
];

const chat = document.getElementById("chat");
const hint = document.getElementById("hint");
const addressEl = document.getElementById("address");
const copiedEl = document.getElementById("copied");

let step = 0;

function addLine(text) {
  const el = document.createElement("div");
  el.className = "line";
  el.textContent = text;
  chat.appendChild(el);

  setTimeout(() => el.classList.add("show"), 10);

  const all = document.querySelectorAll(".line");
  all.forEach((l, i) => {
    if (i < all.length - 1) l.classList.add("old");
  });
}

document.body.addEventListener("click", () => {

  if (step < lines.length - 1) {
    addLine(lines[step]);
    step++;

    if (step === 1) {
      document.body.classList.add("engaged");
    }

  } else if (step === lines.length - 1) {
    // FINAL TAP
    addLine(lines[step]);
    step++;

    setTimeout(finalStep, 180);
  }

});

function finalStep() {
  hint.textContent = "";

  navigator.clipboard.writeText(ADDR).then(() => {

    document.body.classList.add("done");

    // reveal address at same moment
    addressEl.textContent = ADDR;
    addressEl.classList.add("show");

    // confirmation hit
    setTimeout(() => {
      copiedEl.classList.add("show");
    }, 80);

  });
}
</script>

</body>
</html>
