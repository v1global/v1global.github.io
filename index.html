<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V1 | THE ONE</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0A0300;
      --orange: #FF5200;
      --cream: #FFE8D6;
    }

    html, body {
      height: 100%;
      font-family: 'DM Mono', monospace;
      color: var(--cream);
      overflow-x: hidden;

      background:
        radial-gradient(circle at 20% 30%, rgba(255,82,0,0.15), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(255,120,0,0.12), transparent 45%),
        #0A0300;

      animation: bgShift 12s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
      0% { background-position: 20% 30%, 80% 70%; }
      100% { background-position: 30% 40%, 70% 60%; }
    }

    /* GRID */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;

      background-image:
        linear-gradient(rgba(255,82,0,0.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,82,0,0.12) 1px, transparent 1px);

      background-size: 40px 40px;

      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      from { transform: translateY(0); }
      to   { transform: translateY(40px); }
    }

    main {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 3rem 1.6rem 6rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .eyebrow {
      font-size: 0.6rem;
      letter-spacing: 0.35em;
      color: var(--orange);
      margin-bottom: 0.6rem;
    }

    .name-v1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5rem, 25vw, 10rem);
      color: var(--orange);
      line-height: 0.9;

      text-shadow:
        0 0 20px rgba(255,82,0,0.6),
        0 0 60px rgba(255,82,0,0.25);
    }

    .name-the-one {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.2rem, 5vw, 2.5rem);
      letter-spacing: 0.25em;
      opacity: 0.5;
    }

    .send-btn {
      margin-top: 2rem;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.3em;
      color: #fff;
      background: var(--orange);
      border: none;
      padding: 1rem 3rem;
      cursor: pointer;
      position: relative;
      overflow: hidden;

      transition: transform 0.15s ease, box-shadow 0.2s ease;
    }

    .send-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(255,255,255,0.25), transparent 60%);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .send-btn:hover {
      transform: translateY(-2px);
      box-shadow:
        0 0 20px rgba(255,82,0,0.6),
        0 0 60px rgba(255,82,0,0.25);
    }

    .send-btn:hover::before {
      opacity: 1;
    }

    .send-btn:active {
      transform: scale(0.96);
    }

    .copy-confirm {
      margin-top: 0.5rem;
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      color: var(--orange);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .copy-confirm.visible {
      opacity: 1;
    }

    footer {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: var(--orange);
    }
  </style>
</head>

<body>

  <div class="bg"></div>

  <main>
    <p class="eyebrow">// transmission incoming</p>

    <div>
      <span class="name-v1">V1</span>
      <span class="name-the-one">| THE ONE</span>
    </div>

    <button class="send-btn" id="sendBtn">SUPPORT V1</button>
    <div class="copy-confirm" id="confirm">✓ address copied</div>
  </main>

  <footer>made by V1</footer>

  <script>
    const address = 'D2tHP8E4ckTr3hq7sJiM6aHsMHTj4BPFUECecs7hWmx3';
    const btn = document.getElementById('sendBtn');
    const confirmEl = document.getElementById('confirm');

    async function copyWallet() {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(address);
        } else {
          fallbackCopy();
        }
        showConfirm();
      } catch {
        fallbackCopy();
        showConfirm();
      }
    }

    function fallbackCopy() {
      const ta = document.createElement("textarea");
      ta.value = address;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }

    function openPhantom() {
      const url = `https://phantom.app/ul/v1/send?recipient=${address}`;
      window.location.href = url;

      setTimeout(() => {
        window.open('https://phantom.app/', '_blank');
      }, 1200);
    }

    function showConfirm() {
      confirmEl.classList.add('visible');
      setTimeout(() => confirmEl.classList.remove('visible'), 2000);
    }

    btn.addEventListener('click', async () => {
      btn.textContent = 'PROCESSING...';
      btn.disabled = true;

      await copyWallet();
      openPhantom();

      setTimeout(() => {
        btn.textContent = 'SUPPORT V1';
        btn.disabled = false;
      }, 2000);
    });
  </script>

</body>
</html>
