<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>V1</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#ffffff;
  font-family:'DM Mono', monospace;
  overflow:hidden;
  color:#1a1a1a;
  -webkit-tap-highlight-color: transparent;
}

/* glow */
body::before {
  content:"";
  position:absolute;
  width:280px;
  height:280px;
  background:radial-gradient(circle, rgba(249,115,22,0.12), transparent 70%);
  animation:breathe 6s ease-in-out infinite;
}

@keyframes breathe {
  0%,100% { transform:scale(1); opacity:0.6; }
  50% { transform:scale(1.2); opacity:1; }
}

/* layout */
.stage {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:28px;
  max-width:260px;
  text-align:center;
}

/* fox */
.fox {
  width:120px;
  height:120px;
  animation:float 5s ease-in-out infinite;
  transition:all .25s ease;
}

@keyframes float {
  0%,100% { transform:translateY(0); }
  50% { transform:translateY(-8px); }
}

body.engaged .fox {
  transform:scale(1.05);
}

/* chat */
.chat {
  display:flex;
  flex-direction:column;
  gap:6px;
}

.line {
  font-size:14px;
  opacity:0;
  transform:translateY(6px);
}

.line.show {
  opacity:1;
  transform:translateY(0);
  transition:all .3s ease;
}

.line.old {
  opacity:0.35;
}

/* typing cursor */
.cursor::after {
  content:"|";
  margin-left:2px;
  animation:blink 1s infinite;
}

@keyframes blink {
  0%,50%,100% { opacity:1; }
  25%,75% { opacity:0; }
}

/* hint */
.hint {
  font-size:11px;
  opacity:0.4;
  margin-top:8px;
}

/* address */
.address {
  font-size:11px;
  letter-spacing:0.12em;
  margin-top:10px;
  opacity:0;
  transition:all .3s ease;
  word-break:break-all;
}

.address.show {
  opacity:1;
}

/* big copied state */
.copied {
  margin-top:14px;
  font-size:22px;
  letter-spacing:0.18em;
  color:#F97316;
  opacity:0;
  transform:scale(0.9);
  transition:all .3s ease;
}

.copied.show {
  opacity:1;
  transform:scale(1);
}
</style>
</head>

<body>

<div class="stage">

  <!-- fox -->
  <svg class="fox" viewBox="0 0 100 100">
    <polygon points="50,10 90,80 10,80" fill="#F97316"/>
    <circle cx="35" cy="55" r="4" fill="#111"/>
    <circle cx="65" cy="55" r="4" fill="#111"/>
  </svg>

  <div id="chat" class="chat"></div>

  <div id="hint" class="hint">tap →</div>

  <div id="address" class="address"></div>
  <div id="copied" class="copied">COPIED</div>

</div>

<script>
const ADDR = "D2tHP8E4ckTr3hq7sJiM6aHsMHTj4BPFUECecs7hWmx3";

const lines = [
  "what’s up.",
  "you found me.",
  "not many do.",
  "this is a solana address.",
  "if you want to send something...",
  "i’ll give it to you."
];

const chat = document.getElementById("chat");
const hint = document.getElementById("hint");
const addressEl = document.getElementById("address");
const copiedEl = document.getElementById("copied");

let step = 0;

/* TYPE EFFECT */
function typeLine(text, el, speed = 18) {
  let i = 0;
  el.textContent = "";
  el.classList.add("cursor");

  function type() {
    if (i < text.length) {
      el.textContent += text.charAt(i);
      i++;
      setTimeout(type, speed);
    } else {
      el.classList.remove("cursor");
    }
  }

  type();
}

/* add line */
function addLine(text) {
  const el = document.createElement("div");
  el.className = "line show";
  chat.appendChild(el);

  // fade older
  const all = document.querySelectorAll(".line");
  all.forEach((l, i) => {
    if (i < all.length - 1) l.classList.add("old");
  });

  typeLine(text, el);
}

/* tap */
document.body.addEventListener("click", () => {

  if (step < lines.length) {
    addLine(lines[step]);
    step++;

    if (step === 1) {
      document.body.classList.add("engaged");
    }

    if (step === lines.length) {
      setTimeout(finalStep, 500);
    }
  }

});

/* FINAL STEP = AUTO COPY */
function finalStep() {
  hint.textContent = "";

  navigator.clipboard.writeText(ADDR).then(() => {

    addressEl.textContent = ADDR;
    addressEl.classList.add("show");

    setTimeout(() => {
      copiedEl.classList.add("show");
    }, 200);

  });
}
</script>

</body>
</html>
