<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V1 | THE ONE</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg:       #0A0300;
      --surface:  #160800;
      --orange:   #FF5200;
      --hot:      #FF7A00;
      --glow:     #FF6A00;
      --amber:    #FFB300;
      --cream:    #FFE8D6;
      --muted:    #7A3800;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--cream);
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ── Background ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .grid-canvas {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,82,0,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,82,0,0.07) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .glow-main {
      position: absolute;
      top: -10%;
      right: -15%;
      width: 420px;
      height: 420px;
      background: radial-gradient(circle, rgba(255,82,0,0.28) 0%, transparent 70%);
      border-radius: 50%;
      animation: pulse 6s ease-in-out infinite;
    }

    .glow-2 {
      position: absolute;
      bottom: -8%;
      left: -10%;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255,179,0,0.14) 0%, transparent 70%);
      border-radius: 50%;
      animation: pulse 9s ease-in-out infinite reverse;
    }

    .orb1 {
      position: absolute;
      top: 14%;
      left: 5%;
      width: 56px;
      height: 56px;
      border: 1.5px solid rgba(255,82,0,0.4);
      border-radius: 50%;
      animation: floatY 7s ease-in-out infinite;
    }
    .orb1::after {
      content: '';
      position: absolute;
      inset: 10px;
      background: rgba(255,82,0,0.18);
      border-radius: 50%;
    }

    .diamond {
      position: absolute;
      top: 42%;
      right: 8%;
      width: 28px;
      height: 28px;
      border: 1.5px solid rgba(255,179,0,0.55);
      transform: rotate(45deg);
      animation: floatY 5s ease-in-out infinite 1s;
    }

    .bracket {
      position: absolute;
      top: 7%;
      right: 7%;
      width: 44px;
      height: 44px;
      border-top: 2px solid rgba(255,82,0,0.5);
      border-right: 2px solid rgba(255,82,0,0.5);
    }

    .bracket-2 {
      position: absolute;
      bottom: 14%;
      left: 6%;
      width: 36px;
      height: 36px;
      border-bottom: 2px solid rgba(255,179,0,0.4);
      border-left: 2px solid rgba(255,179,0,0.4);
    }

    .scanline {
      position: absolute;
      left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,82,0,0.18), transparent);
      animation: scan 8s linear infinite;
    }

    .dot1 {
      position: absolute;
      top: 30%;
      right: 20%;
      width: 6px; height: 6px;
      background: var(--amber);
      border-radius: 50%;
      opacity: 0.7;
      animation: floatY 4s ease-in-out infinite 0.5s;
    }
    .dot2 {
      position: absolute;
      bottom: 35%;
      right: 18%;
      width: 4px; height: 4px;
      background: var(--orange);
      border-radius: 50%;
      opacity: 0.5;
      animation: floatY 6s ease-in-out infinite 2s;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.7; transform: scale(1.08); }
    }
    @keyframes floatY {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }
    @keyframes scan {
      0%   { top: -2px; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    /* ── Layout ── */
    main {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 3.5rem 1.8rem 7rem 1.8rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .eyebrow {
      font-size: 0.58rem;
      letter-spacing: 0.35em;
      color: var(--orange);
      text-transform: uppercase;
      margin-bottom: 0.6rem;
      margin-left: 4px;
      opacity: 0.8;
    }

    /* ── Name ── */
    .name-block {
      margin-bottom: 1.8rem;
    }

    .name-v1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(6rem, 30vw, 11rem);
      line-height: 0.85;
      color: var(--orange);
      display: block;
      letter-spacing: 0.02em;
      text-shadow:
        0 0 30px rgba(255,82,0,0.5),
        0 0 80px rgba(255,82,0,0.2);
    }

    .name-the-one {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.3rem, 6vw, 2.8rem);
      letter-spacing: 0.28em;
      color: var(--cream);
      display: block;
      margin-left: 5px;
      margin-top: 0.3rem;
      opacity: 0.45;
    }

    /* ── Divider ── */
    .dash {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin: 0 0 2rem 3px;
    }
    .dash-line {
      width: 40px;
      height: 1px;
      background: var(--orange);
      opacity: 0.6;
    }
    .dash-dot {
      width: 5px;
      height: 5px;
      background: var(--orange);
      border-radius: 50%;
    }

    /* ── CTA ── */
    .cta-area {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.6rem;
      margin-bottom: 3rem;
      margin-left: 3px;
    }

    .send-btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.38em;
      color: #ffffff;
      background: var(--orange);
      border: none;
      padding: 0.9rem 3.2rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
      box-shadow:
        0 0 18px rgba(255,82,0,0.45),
        0 0 40px rgba(255,82,0,0.2);
      transition: box-shadow 0.15s ease, transform 0.1s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .send-btn:active {
      transform: scale(0.97);
      box-shadow: 0 0 8px rgba(255,82,0,0.3);
    }

    .copy-confirm {
      font-size: 0.6rem;
      letter-spacing: 0.28em;
      color: #FF5200;
      text-transform: uppercase;
      height: 1rem;
      opacity: 0;
      transition: opacity 0.25s;
      margin-left: 4px;
    }
    .copy-confirm.visible { opacity: 1; }

    /* ── Instructions card ── */
    .card-wrap {
      max-width: 300px;
      margin-left: 3px;
      margin-top: 0.8rem;
    }

    .card {
      background: #ffffff;
      border: 2px solid var(--orange);
      padding: 1.4rem 1.5rem 1.4rem;
      position: relative;
      box-shadow:
        0 0 24px rgba(255,82,0,0.22),
        0 0 48px rgba(255,82,0,0.08);
    }

    .card-label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 0.52rem;
      font-weight: 500;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--orange);
      opacity: 0.5;
      margin-bottom: 1rem;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.5rem 0;
    }

    .step-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      color: var(--orange);
      line-height: 1;
      flex-shrink: 0;
      width: 2rem;
      text-align: right;
      opacity: 0.9;
    }

    .step-divider {
      width: 1px;
      height: 1.1rem;
      background: rgba(255,82,0,0.25);
      flex-shrink: 0;
    }

    .step-text {
      font-size: 0.64rem;
      letter-spacing: 0.1em;
      color: var(--orange);
      line-height: 1;
      font-weight: 400;
      text-transform: uppercase;
    }

    /* ── Footer ── */
    footer {
      position: fixed;
      bottom: 1.4rem;
      right: 1.6rem;
      font-size: 0.52rem;
      letter-spacing: 0.3em;
      color: var(--orange);
      text-transform: uppercase;
      z-index: 2;
    }
  </style>

</head>

<body>

  <div class="bg">

    <div class="bracket"></div>
    <div class="bracket-2"></div>
    <div class="scanline"></div>
    <div class="dot1"></div>
    <div class="dot2"></div>
  </div>

  </main>

  <footer>made by V1</footer>

  <script>
    const address = 'D2tHP8E4ckTr3hq7sJiM6aHsMHTj4BPFUECecs7hWmx3';

    function copyWallet() {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(address).then(showConfirm);
      } else {
        const ta = document.createElement("textarea");
        ta.value = address;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        showConfirm();
      }
    }

    function copyAndOpenPhantom() {
      const btn = document.querySelector('.send-btn');
      btn.textContent = 'OPENING...';
      copyWallet();
      setTimeout(() => {
        window.location.href = 'https://phantom.app/ul/v1/send?recipient=@v1rtuozas' + address;
      }, 500);
    }

    function showConfirm() {
      const el = document.getElementById('confirm');
      el.classList.add('visible');
      setTimeout(() => el.classList.remove('visible'), 2000);
    }
  </script>

</body>
