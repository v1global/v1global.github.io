<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>V1</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'DM Mono', monospace;
  background:#ffffff;
  overflow:hidden;
  color:#1a1a1a;
  -webkit-tap-highlight-color: transparent;
}

/* ambient glow */
body::before {
  content:"";
  position:absolute;
  width:300px;
  height:300px;
  background:radial-gradient(circle, rgba(249,115,22,0.12), transparent 70%);
  animation:breathe 6s ease-in-out infinite;
}

@keyframes breathe {
  0%,100% { transform:scale(1); opacity:0.6; }
  50% { transform:scale(1.25); opacity:1; }
}

/* whole page = button */
.hit {
  position:absolute;
  inset:0;
  z-index:5;
}

/* layout */
.stage {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:26px;
  pointer-events:none;
}

/* fox */
.fox-wrap {
  animation:float 5s ease-in-out infinite;
  transition:all .25s ease;
}

@keyframes float {
  0%,100% { transform:translateY(0); }
  50% { transform:translateY(-10px); }
}

/* reaction */
body.engaged .fox-wrap {
  transform:scale(1.06);
  filter:drop-shadow(0 25px 70px rgba(249,115,22,0.45));
}

/* text */
.text {
  font-size:14px;
  letter-spacing:0.08em;
  opacity:0.7;
  transition:all .4s ease;
}

.text.small {
  font-size:11px;
  opacity:0.5;
}

.hidden {
  opacity:0;
  transform:translateY(6px);
}

/* reveal */
.show {
  opacity:1 !important;
  transform:translateY(0) !important;
}

/* pulse feedback */
body.done::before {
  animation:none;
  transform:scale(1.4);
  opacity:0.2;
}
</style>
</head>

<body>

<div class="hit" id="hit"></div>

<div class="stage">

  <!-- YOUR FULL FOX SVG (unchanged) -->
  <div class="fox-wrap">
    <!-- PASTE YOUR ORIGINAL FOX SVG HERE -->
  </div>

  <div id="t1" class="text">what’s up.</div>
  <div id="t2" class="text hidden">tap.</div>
  <div id="t3" class="text small hidden">D2tH••••Wmx3</div>

</div>

<script>
const ADDR = "D2tHP8E4ckTr3hq7sJiM6aHsMHTj4BPFUECecs7hWmx3";

const hit = document.getElementById("hit");
const t2 = document.getElementById("t2");
const t3 = document.getElementById("t3");

setTimeout(() => {
  t2.classList.add("show");
}, 1000);

let used = false;

hit.addEventListener("click", () => {

  if (!used) {
    used = true;

    document.body.classList.add("engaged");

    // reveal address
    t3.classList.remove("hidden");
    setTimeout(() => t3.classList.add("show"), 80);

    // try open wallet
    const universal = `https://phantom.app/ul/v1/send?to=${ADDR}`;
    const appScheme = `phantom://v1/send?to=${ADDR}`;
    const isMobile  = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

    if (isMobile) {
      window.location.href = appScheme;
      setTimeout(() => fallback(), 1200);
    } else {
      fallback();
      window.open(universal, "_blank");
    }

  } else {
    // second tap = always copy again
    fallback();
  }
});

function fallback() {
  navigator.clipboard.writeText(ADDR).then(() => {
    document.body.classList.add("done");
    t2.textContent = "copied.";
    t3.textContent = ADDR;
  });
}
</script>

</body>
</html>
