:root {
  --bg: #080808;
  --surface: #0f0f0f;
  --border: #1e1e1e;
  --text: #e8e8e0;
  --muted: #555550;
  --accent: #c8ff00; /* electric lime — prophetic, awake */
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  overflow-x: hidden;
}

/* subtle grain overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-repeat: repeat;
  background-size: 180px;
  pointer-events: none;
  z-index: 0;
  opacity: 0.5;
}

main {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  gap: 0;
}

/* logo / name block */
.identity {
  text-align: center;
  margin-bottom: 4rem;
  animation: fadeUp 1s ease both;
}

.identity .v1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(4rem, 16vw, 10rem);
  letter-spacing: 0.04em;
  line-height: 0.9;
  color: var(--text);
}

.identity .pipe {
  color: var(--accent);
}

.identity .role {
  font-family: 'DM Mono', monospace;
  font-weight: 300;
  font-size: clamp(0.65rem, 2vw, 0.85rem);
  letter-spacing: 0.35em;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 0.75rem;
}

/* horizontal rule */
.divider {
  width: 1px;
  height: 60px;
  background: linear-gradient(to bottom, transparent, var(--border), transparent);
  margin-bottom: 4rem;
  animation: fadeUp 1s 0.2s ease both;
}

/* action block */
.action-block {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1.5rem;
  animation: fadeUp 1s 0.4s ease both;
}

.label {
  font-size: 0.65rem;
  letter-spacing: 0.4em;
  color: var(--muted);
  text-transform: uppercase;
}

/* wallet address */
.wallet-wrap {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 2px;
  padding: 0.85rem 1.1rem;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  max-width: 100%;
}

.wallet-wrap:hover {
  border-color: var(--accent);
  background: #121200;
}

.wallet-address {
  font-family: 'DM Mono', monospace;
  font-size: clamp(0.55rem, 2.5vw, 0.75rem);
  font-weight: 300;
  color: var(--text);
  letter-spacing: 0.06em;
  word-break: break-all;
  user-select: all;
}

.copy-icon {
  flex-shrink: 0;
  color: var(--muted);
  transition: color 0.2s;
}

.wallet-wrap:hover .copy-icon {
  color: var(--accent);
}

/* copy confirmation */
.copy-confirm {
  font-size: 0.6rem;
  letter-spacing: 0.35em;
  color: var(--accent);
  text-transform: uppercase;
  height: 1rem;
  opacity: 0;
  transition: opacity 0.3s;
}

.copy-confirm.visible {
  opacity: 1;
}

/* big send button */
.send-btn {
  margin-top: 1.5rem;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 0.25em;
  color: var(--bg);
  background: var(--accent);
  border: none;
  border-radius: 2px;
  padding: 0.9rem 3rem;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
  text-decoration: none;
  display: inline-block;
}

.send-btn:hover {
  background: #d9ff33;
  transform: translateY(-1px);
}

.send-btn:active {
  transform: translateY(0);
}

/* footer */
footer {
  position: fixed;
  bottom: 1.5rem;
  left: 0;
  right: 0;
  text-align: center;
  font-size: 0.55rem;
  letter-spacing: 0.3em;
  color: var(--border);
  text-transform: uppercase;
  z-index: 1;
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(18px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

      const address = 'FknzAd52MR1aqLedBxvQXaiRMZRTZKdbahXq8LHdz1DT';
      navigator.clipboard.writeText(address).then(() => {
