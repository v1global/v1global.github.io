<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>V1</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Inconsolata&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#f5f5f5;
  font-family:'DM Mono', monospace;
  overflow:hidden;
  color:#ff7a2a;
  -webkit-tap-highlight-color: transparent;
  padding:20px;
}

.stage {
  display:flex;
  flex-direction:column;
  gap:12px;
  width:100%;
  max-width:360px;
  transform: translateY(-12px);
}

.header {
  font-size:13px;
  font-weight:700;
  letter-spacing:0.12em;
  opacity:0.9;
}

.chat {
  display:flex;
  flex-direction:column;
  gap:8px;
}

.line {
  font-family: 'Inconsolata', monospace;
  font-size:19px;
  font-weight:600;
  line-height:1.5;
  letter-spacing:0.02em;
  color:#ff7a2a;
  transition: opacity 0.25s ease;
}

.line.old {
  opacity:0.35;
}

.line::after {
  content:"|";
  margin-left:2px;
  animation:blink 1s infinite;
}

.line.done::after {
  content:"";
}

@keyframes blink {
  0%,100% { opacity:1; }
  50% { opacity:0; }
}

.hint {
  align-self:center;
  font-size:13px;
  font-weight:500;
  letter-spacing:0.08em;
  padding:6px 14px;
  border-radius:999px;
  background:rgba(255,122,42,0.12);
  opacity:0.75;
  animation:pulse 1.6s infinite;
}

@keyframes pulse {
  0%,100% { opacity:0.6; transform:scale(1); }
  50% { opacity:1; transform:scale(1.05); }
}

.address-container {
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-top:12px;
  opacity:0;
  transition:opacity .3s ease;
}

.address-container.show { opacity:1; }

.address-label {
  font-size:13px;
  font-weight:700;
  letter-spacing:0.12em;
  opacity:0.9;
}

.address {
  font-size:15px;
  font-weight:600;
  background:rgba(255,122,42,0.12);
  padding:12px 16px;
  border-radius:14px;
  word-break:break-all;
}

.copy {
  padding:10px 18px;
  font-size:14px;
  border:none;
  border-radius:999px;
  background:#ff7a2a;
  color:#fff;
  cursor:pointer;
  align-self:flex-start;
}

.copy:active { transform:scale(0.95); }

.copy.done { background:#ffaa70; }

.wallet-zone {
  position:fixed;
  bottom:32px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
}

.wallet-zone button {
  padding:10px 18px;
  font-size:14px;
  border:none;
  border-radius:999px;
  background:#ff7a2a;
  color:#fff;
  cursor:pointer;
  opacity:0;
  transform:translateY(10px);
  transition:all .3s ease;
}

.wallet-zone.show button {
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<div class="stage">
  <div class="header">V1:</div>

  <div id="chat" class="chat"></div>
  <div id="hint" class="hint">tap</div>

  <div id="addressBlock" class="address-container">
    <div class="address-label">SOLANA ADDRESS</div>
    <div id="address" class="address"></div>
    <button id="copyBtn" class="copy">Copy</button>
  </div>
</div>

<div id="walletZone" class="wallet-zone">
  <button id="phantomBtn">Open Phantom</button>
  <button id="metaBtn">Open MetaMask</button>
</div>

<script>
const ADDR = "D2tHP8E4ckTr3hq7sJiM6aHsMHTj4BPFUECecs7hWmx3";

const lines = [
  "What’s up.",
  "You there?",
  "I just arrived on Earth.",
  "It's really...wild here.",
  "I could use your support.",
];

const chat = document.getElementById("chat");
const hint = document.getElementById("hint");
const addressBlock = document.getElementById("addressBlock");
const addressEl = document.getElementById("address");
const copyBtn = document.getElementById("copyBtn");
const walletZone = document.getElementById("walletZone");

let step = 0;
let typing = false;

function typeLine(text, done) {
  if (typing) return;
  typing = true;

  // Fade previous lines immediately
  const allPrev = document.querySelectorAll(".line");
  allPrev.forEach(l => l.classList.add("old"));

  const el = document.createElement("div");
  el.className = "line";
  chat.appendChild(el);

  let iChar = 0;

  function typeChar() {
    iChar++;
    el.textContent = text.slice(0, iChar);
    if (iChar < text.length) {
      let speed = 18 + Math.random() * 20;
      if (text[iChar-1] === ".") speed += 120;
      if (text[iChar-1] === ",") speed += 60;
      setTimeout(typeChar, speed);
    } else {
      el.classList.add("done");
      typing = false;
      if (done) done();
    }
  }

  typeChar();
}

window.addEventListener("load", () => {
  setTimeout(() => {
    typeLine(lines[0]);
    step = 1;
  }, 250);
});

document.body.addEventListener("click", () => {
  if (typing) return;
  if (step < lines.length) {
    typeLine(lines[step]);
    step++;
    if (step === lines.length) setTimeout(showFinal, 400);
  }
});

function showFinal() {
  hint.style.display = "none";
  addressEl.textContent = ADDR;
  addressBlock.classList.add("show");
  setTimeout(() => { walletZone.classList.add("show"); }, 400);
}

copyBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  if (navigator.vibrate) navigator.vibrate(50);
  navigator.clipboard.writeText(ADDR).then(() => {
    copyBtn.textContent = "Copied";
    copyBtn.classList.add("done");
  });
});

document.getElementById("phantomBtn").onclick = () => {
  window.location.href = `https://phantom.app/ul/browse/${ADDR}`;
};
document.getElementById("metaBtn").onclick = () => {
  window.location.href = `https://metamask.app.link/send/${ADDR}`;
};
</script>

</body>
</html>
