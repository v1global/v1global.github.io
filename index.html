<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V1 | THE ONE</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background: #000;
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-weight: 300;
    }

    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }

    .name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.5rem, 14vw, 8rem);
      letter-spacing: 0.05em;
      line-height: 1;
      text-align: center;
    }

    .send-btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.3em;
      color: #000;
      background: #fff;
      border: none;
      padding: 0.8rem 2.8rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: opacity 0.2s;
    }

    .send-btn:hover {
      opacity: 0.85;
    }

    .copy-confirm {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      color: #555;
      text-transform: uppercase;
      height: 1rem;
      opacity: 0;
      transition: opacity 0.25s;
      text-align: center;
    }

    .copy-confirm.visible {
      opacity: 1;
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.55rem;
      letter-spacing: 0.25em;
      color: #333;
      text-transform: uppercase;
    }
  </style>
</head>

<body>

  <main>
    <div class="name">V1 | THE ONE</div>

    <a class="send-btn" href="#" onclick="copyAndOpenPhantom()">CONTRIBUTE</a>
    <div class="copy-confirm" id="confirm">copied</div>
  </main>

  <footer>solana network</footer>

  <script>
    const address = 'D2tHP8E4ckTr3hq7sJiM6aHsMHTj4BPFUECecs7hWmx3';

    function copyWallet() {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(address).then(showConfirm);
      } else {
        const textarea = document.createElement("textarea");
        textarea.value = address;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);
        showConfirm();
      }
    }

    function copyAndOpenPhantom() {
      copyWallet();
      setTimeout(() => {
        window.location.href = 'https://phantom.app/ul/v1/send?recipient=' + address;
      }, 50);
    }

    function showConfirm() {
      const el = document.getElementById('confirm');
      el.classList.add('visible');
      setTimeout(() => el.classList.remove('visible'), 2000);
    }
  </script>

</body>
</html>
