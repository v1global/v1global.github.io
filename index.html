<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>V1</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#f5f5f5;
  font-family:'DM Mono', monospace;
  overflow:hidden;
  color:#ff7a2a;
  -webkit-tap-highlight-color: transparent;
  padding:20px;
}

/* --- INTRO (ultra-lightweight) --- */
#presence {
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#f5f5f5;
  z-index:999;
}

.presence-inner {
  text-align:center;
  opacity:0;
  transform:scale(0.98);
  transition:all 0.4s ease;
}

.presence-main {
  font-family:'Space Grotesk', sans-serif;
  font-size:52px;
  letter-spacing:0.18em;
  color:#ff7a2a;
  opacity:0;
  transform:translateY(6px);
  transition:all 0.35s ease;
  font-weight:600;
}

.presence-sub {
  margin-top:8px;
  font-family:'Space Grotesk', sans-serif;
  font-size:13px;
  letter-spacing:0.5em;
  color:#ff7a2a;
  opacity:0;
  transition:opacity 0.3s ease;
}

/* layout */
.stage {
  display:flex;
  flex-direction:column;
  gap:16px;
  width:100%;
  max-width:360px;
  transform: translateY(24px);
}

.chat {
  display:flex;
  flex-direction:column;
  gap:6px;
}

.line {
  font-size:16px;
  line-height:1.4;
}

.line.old {
  opacity:0.35;
  transition:opacity .25s ease;
}

/* cursor */
.line::after {
  content:"|";
  margin-left:2px;
  animation:blink 1s infinite;
}

.line.done::after {
  content:"";
}

@keyframes blink {
  0%,100% { opacity:1; }
  50% { opacity:0; }
}

.hint {
  font-size:14px;
  opacity:0.7;
  animation:pulse 1.6s infinite;
}

@keyframes pulse {
  0%,100% { opacity:0.65; }
  50% { opacity:0.95; }
}

/* address */
.address-container {
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-top:12px;
  opacity:0;
  transition:opacity .3s ease;
}

.address-container.show { opacity:1; }

.address-label {
  font-size:12px;
  letter-spacing:0.14em;
  opacity:0.75;
  font-weight:500;
}

.address {
  font-size:15px;
  font-weight:600;
  background:rgba(255,122,42,0.12);
  padding:12px 16px;
  border-radius:14px;
  word-break:break-all;
}

/* copy */
.copy {
  padding:10px 18px;
  font-size:14px;
  border:none;
  border-radius:999px;
  background:#ff7a2a;
  color:#fff;
  cursor:pointer;
  align-self:flex-start;
}

.copy:active { transform:scale(0.95); }
.copy.done { background:#ffaa70; }

/* wallet buttons */
.wallet-zone {
  position:fixed;
  bottom:32px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
}

.wallet-zone button {
  padding:8px 14px;
  font-size:13px;
  border:none;
  border-radius:999px;
  background:#ff7a2a;
  color:#fff;
  cursor:pointer;
  opacity:0;
  transform:translateY(10px);
  transition:all .3s ease;
}

.wallet-zone.show button {
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="presence">
  <div class="presence-inner">
    <div class="presence-main">V1</div>
    <div class="presence-sub">THE ONE</div>
  </div>
</div>

<div class="stage">
  <div id="chat" class="chat"></div>
  <div id="hint" class="hint">tap →</div>

  <div id="addressBlock" class="address-container">
    <div class="address-label">SOLANA ADDRESS</div>
    <div id="address" class="address"></div>
    <button id="copyBtn" class="copy">copy</button>
  </div>
</div>

<div id="walletZone" class="wallet-zone">
  <button id="phantomBtn">Open Phantom</button>
  <button id="metaBtn">Open MetaMask</button>
</div>

<script>
const ADDR = "D2tHP8E4ckTr3hq7sJiM6aHsMHTj4BPFUECecs7hWmx3";

const lines = [
  "what’s up.",
  "you found me.",
  "not many do.",
  "this is a solana address.",
  "if you want to send something...",
  "i’ll give it to you."
];

const chat = document.getElementById("chat");
const hint = document.getElementById("hint");
const addressBlock = document.getElementById("addressBlock");
const addressEl = document.getElementById("address");
const copyBtn = document.getElementById("copyBtn");
const walletZone = document.getElementById("walletZone");

let step = 0;
let typing = false;

/* lightweight intro */
function runPresence() {
  const wrap = document.getElementById("presence");
  const inner = wrap.querySelector(".presence-inner");
  const main = wrap.querySelector(".presence-main");
  const sub = wrap.querySelector(".presence-sub");

  inner.style.opacity = "1";
  inner.style.transform = "scale(1)";

  setTimeout(() => {
    main.style.opacity = "1";
    main.style.transform = "translateY(0)";
  }, 200);

  setTimeout(() => {
    sub.style.opacity = "0.85";
  }, 400);

  setTimeout(() => {
    wrap.style.opacity = "0";
  }, 900);

  setTimeout(() => wrap.remove(), 1200);
}

function typeLine(text, done) {
  if (typing) return;
  typing = true;

  const el = document.createElement("div");
  el.className = "line";
  chat.appendChild(el);

  let i = 0;

  function typeChar() {
    el.textContent = text.slice(0, i + 1);
    i++;

    if (i < text.length) {
      let speed = 18 + Math.random() * 20;
      if (text[i-1] === ".") speed += 120;
      if (text[i-1] === ",") speed += 60;
      setTimeout(typeChar, speed);
    } else {
      el.classList.add("done");

      const all = document.querySelectorAll(".line");
      all.forEach((l, idx) => {
        if (idx < all.length - 1) l.classList.add("old");
      });

      typing = false;
      if (done) done();
    }
  }

  typeChar();
}

window.addEventListener("load", () => {
  runPresence();

  setTimeout(() => {
    typeLine(lines[0]);
    step = 1;
  }, 1100);
});

document.body.addEventListener("click", () => {
  if (typing) return;

  if (step < lines.length) {
    typeLine(lines[step]);
    step++;

    if (step === lines.length) {
      setTimeout(showFinal, 400);
    }
  }
});

function showFinal() {
  hint.style.display = "none";
  addressEl.textContent = ADDR;
  addressBlock.classList.add("show");

  setTimeout(() => {
    walletZone.classList.add("show");
  }, 400);
}

copyBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  navigator.clipboard.writeText(ADDR).then(() => {
    copyBtn.textContent = "copied.";
    copyBtn.classList.add("done");
  });
});

document.getElementById("phantomBtn").onclick = () => {
  window.location.href = `https://phantom.app/ul/browse/${ADDR}`;
};

document.getElementById("metaBtn").onclick = () => {
  window.location.href = `https://metamask.app.link/send/${ADDR}`;
};
</script>

</body>
</html>
