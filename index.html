<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V1 | THE ONE</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background: #ffffff;
      color: #0a0a0a;
      font-family: 'DM Mono', monospace;
      font-weight: 300;
    }

    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }

    .name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3.5rem, 14vw, 8rem);
      letter-spacing: 0.05em;
      line-height: 1;
      text-align: center;
      color: #0a0a0a;
    }

    .send-btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.3em;
      color: #ffffff;
      background: #ff6a00;
      border: 1px solid #ff6a00;
      padding: 0.8rem 2.8rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: all 0.2s ease;
    }

    .send-btn:hover {
      background: #ffffff;
      color: #ff6a00;
      box-shadow: 0 0 12px rgba(255,106,0,0.25);
    }

    .copy-confirm {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: #ff6a00;
      text-transform: uppercase;
      height: 1rem;
      opacity: 0;
      transition: opacity 0.25s;
      text-align: center;
    }

    .copy-confirm.visible {
      opacity: 1;
    }

    .instructions {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: #666;
      text-align: left;
      line-height: 1.5;
      letter-spacing: 0.04em;
      max-width: 320px;
      margin-top: 1.5rem;
    }

    footer {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      color: #111;
      text-transform: uppercase;
    }
  </style>
</head>

<body>

  <main>
    <div class="name">V1 | THE ONE</div>

    <a class="send-btn" href="#" onclick="copyAndOpenPhantom(event)">SUPPORT V1</a>
    <div class="copy-confirm" id="confirm">copied</div>

    <div class="instructions">
      INSTRUCTIONS:<br>
      1. Press “SUPPORT V1”<br>
      2. Press Send → Select Solana<br>
      3. Paste Address or Use: @v1rtuozas<br>
      4. Enter Amount → Confirm<br>
      5. Thank you for your support!
    </div>
  </main>

  <footer>made by V1</footer>

  <script>
    const address = 'D2tHP8E4ckTr3hq7sJiM6aHsMHTj4BPFUECecs7hWmx3';

    function copyWallet() {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(address).then(showConfirm);
      } else {
        const textarea = document.createElement("textarea");
        textarea.value = address;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);
        showConfirm();
      }
    }

    function copyAndOpenPhantom(event) {
      event.preventDefault();

      const btn = document.querySelector('.send-btn');

      // Step 1: PROCESSING feedback
      btn.textContent = 'PROCESSING...';
      copyWallet();

      // Step 2: Slight delay → OPENING PHANTOM
      setTimeout(() => {
        btn.textContent = 'OPENING PHANTOM...';

        // Open Phantom immediately while still considered a user gesture
        window.open('https://phantom.app/ul/v1/send?recipient=' + address, '_blank');

        // Step 3: Reset button after a bit
        setTimeout(() => {
          btn.textContent = 'SUPPORT V1';
        }, 1500);

      }, 1000); // 1s PROCESSING display
    }

    function showConfirm() {
      const el = document.getElementById('confirm');
      el.classList.add('visible');
      setTimeout(() => el.classList.remove('visible'), 2000);
    }
  </script>

</body>
</html>
