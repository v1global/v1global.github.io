<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>V1 | THE ONE</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --orange:       #FF5200;
      --orange-mid:   #FF8C42;
      --orange-light: #FFDCC8;
      --yellow:       #FFD000;
      --dark:         #1A0800;
      --cream:        #FFF8F0;
      --cream-2:      #FFF0E0;
    }

    html, body {
      height: 100%;
      background: var(--cream);
      color: var(--dark);
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ── Background shapes ── */
    .bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    /* Large organic blob — top right */
    .b1 {
      position: absolute;
      top: -100px;
      right: -80px;
      width: 320px;
      height: 290px;
      background: var(--orange);
      opacity: 0.13;
      border-radius: 68% 32% 55% 45% / 48% 42% 58% 52%;
      animation: drift1 14s ease-in-out infinite;
    }

    /* Medium blob — bottom left */
    .b2 {
      position: absolute;
      bottom: -70px;
      left: -50px;
      width: 240px;
      height: 210px;
      background: var(--yellow);
      opacity: 0.28;
      border-radius: 42% 58% 35% 65% / 58% 32% 68% 42%;
      animation: drift2 17s ease-in-out infinite;
    }

    /* Small circle — mid-page left */
    .b3 {
      position: absolute;
      top: 44%;
      left: 6%;
      width: 72px;
      height: 72px;
      background: var(--orange-mid);
      opacity: 0.15;
      border-radius: 50%;
    }

    /* Dot — upper mid-right */
    .b4 {
      position: absolute;
      top: 22%;
      right: 10%;
      width: 36px;
      height: 36px;
      background: var(--yellow);
      opacity: 0.55;
      border-radius: 50%;
    }

    /* Pebble — lower right */
    .b5 {
      position: absolute;
      bottom: 28%;
      right: 12%;
      width: 58px;
      height: 50px;
      background: var(--orange-light);
      border-radius: 58% 42% 50% 50% / 42% 58% 42% 58%;
    }

    /* Tiny dot cluster — top left area */
    .b6 {
      position: absolute;
      top: 18%;
      left: 20%;
      width: 14px;
      height: 14px;
      background: var(--orange);
      opacity: 0.35;
      border-radius: 50%;
    }
    .b7 {
      position: absolute;
      top: 21%;
      left: 24%;
      width: 8px;
      height: 8px;
      background: var(--orange);
      opacity: 0.2;
      border-radius: 50%;
    }

    @keyframes drift1 {
      0%,100% { transform: translate(0,0) rotate(0deg);   border-radius: 68% 32% 55% 45% / 48% 42% 58% 52%; }
      40%      { transform: translate(14px,22px) rotate(4deg);  border-radius: 50% 50% 42% 58% / 58% 42% 58% 42%; }
      70%      { transform: translate(-8px,12px) rotate(-2deg); border-radius: 60% 40% 65% 35% / 40% 65% 35% 65%; }
    }
    @keyframes drift2 {
      0%,100% { transform: translate(0,0) rotate(0deg); }
      50%      { transform: translate(18px,-12px) rotate(6deg); }
    }

    /* ── Layout ── */
    main {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      padding: 3.2rem 1.8rem 7rem 1.8rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* ── Name ── */
    .name-block {
      margin-bottom: 0.6rem;
    }

    .name-v1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(5.5rem, 27vw, 10rem);
      line-height: 0.88;
      color: var(--orange);
      display: block;
      letter-spacing: 0.02em;
    }

    .name-the-one {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.5rem, 7.5vw, 3.2rem);
      letter-spacing: 0.18em;
      color: var(--dark);
      display: block;
      margin-left: 0.4rem;
      margin-top: 0.25rem;
      opacity: 0.55;
    }

    /* ── Divider ── */
    .dash {
      width: 52px;
      height: 3px;
      background: var(--orange);
      margin: 1.6rem 0 1.6rem 3px;
    }

    /* ── CTA ── */
    .cta-area {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.55rem;
      margin-bottom: 2.8rem;
      margin-left: 3px;
    }

    .send-btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.05rem;
      letter-spacing: 0.32em;
      color: var(--cream);
      background: var(--orange);
      border: 2.5px solid var(--dark);
      padding: 0.85rem 3rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      box-shadow: 4px 4px 0px var(--dark);
      transform: rotate(-1.2deg);
      transition: box-shadow 0.12s ease, transform 0.12s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .send-btn:active {
      box-shadow: 2px 2px 0px var(--dark);
      transform: rotate(-1.2deg) translate(2px, 2px);
    }

    .copy-confirm {
      font-size: 0.62rem;
      letter-spacing: 0.25em;
      color: var(--orange);
      text-transform: uppercase;
      height: 1rem;
      opacity: 0;
      transition: opacity 0.25s;
      margin-left: 2px;
    }

    .copy-confirm.visible { opacity: 1; }

    /* ── Instructions card ── */
    .card {
      background: var(--cream-2);
      border: 2.5px solid var(--dark);
      padding: 1.5rem 1.4rem 1.4rem;
      max-width: 290px;
      box-shadow: 6px 6px 0px var(--orange);
      transform: rotate(1.8deg);
      margin-left: 10px;
      position: relative;
    }

    .card-label {
      position: absolute;
      top: -0.85rem;
      left: 1rem;
      background: var(--orange);
      color: var(--cream);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.22em;
      padding: 0.15rem 0.7rem;
      border: 1.5px solid var(--dark);
    }

    .card-inner {
      transform: rotate(-1.8deg);
    }

    .step {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      margin-bottom: 0.55rem;
    }
    .step:last-child { margin-bottom: 0; }

    .step-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      color: var(--orange);
      line-height: 1;
      flex-shrink: 0;
      width: 1.3rem;
    }

    .step-text {
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      color: var(--dark);
      line-height: 1.45;
    }

    /* ── Footer ── */
    footer {
      position: fixed;
      bottom: 1.4rem;
      right: 1.5rem;
      font-size: 0.56rem;
      letter-spacing: 0.28em;
      color: var(--dark);
      text-transform: uppercase;
      opacity: 0.4;
      z-index: 2;
    }
  </style>

</head>

<body>

  <div class="bg">
    <div class="b1"></div>
    <div class="b2"></div>
    <div class="b3"></div>
    <div class="b4"></div>
    <div class="b5"></div>
    <div class="b6"></div>
    <div class="b7"></div>
  </div>

  </main>

  <footer>made by V1</footer>

  <script>
    const address = 'D2tHP8E4ckTr3hq7sJiM6aHsMHTj4BPFUECecs7hWmx3';

    function copyWallet() {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(address).then(showConfirm);
      } else {
        const ta = document.createElement("textarea");
        ta.value = address;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        showConfirm();
      }
    }

    function copyAndOpenPhantom() {
      const btn = document.querySelector('.send-btn');
      btn.textContent = 'OPENING...';
      copyWallet();
      setTimeout(() => {
        window.location.href = 'https://phantom.app/ul/v1/send?recipient=@v1rtuozas' + address;
      }, 500);
    }

    function showConfirm() {
      const el = document.getElementById('confirm');
      el.classList.add('visible');
      setTimeout(() => el.classList.remove('visible'), 2000);
    }
  </script>

</body>
</html>
