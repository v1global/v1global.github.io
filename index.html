<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>V1</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#ffffff;
  font-family:'DM Mono', monospace;
  overflow:hidden;
  color:#1a1a1a;
  -webkit-tap-highlight-color: transparent;
}

/* soft glow */
body::before {
  content:"";
  position:absolute;
  width:280px;
  height:280px;
  background:radial-gradient(circle, rgba(249,115,22,0.12), transparent 70%);
  animation:breathe 6s ease-in-out infinite;
}

@keyframes breathe {
  0%,100% { transform:scale(1); opacity:0.6; }
  50% { transform:scale(1.2); opacity:1; }
}

/* layout */
.stage {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:28px;
  max-width:260px;
  text-align:center;
}

/* fox */
.fox {
  width:120px;
  height:120px;
  animation:float 5s ease-in-out infinite;
  transition:all .25s ease;
}

@keyframes float {
  0%,100% { transform:translateY(0); }
  50% { transform:translateY(-8px); }
}

body.engaged .fox {
  transform:scale(1.05);
}

/* chat */
.chat {
  display:flex;
  flex-direction:column;
  gap:6px;
}

.line {
  font-size:14px;
  opacity:0;
  transform:translateY(6px);
  transition:all .35s ease;
}

.line.show {
  opacity:1;
  transform:translateY(0);
}

.line.old {
  opacity:0.35;
}

/* hint */
.hint {
  font-size:11px;
  opacity:0.4;
  margin-top:8px;
}

/* final state */
.address {
  font-size:11px;
  letter-spacing:0.12em;
  margin-top:10px;
  opacity:0;
  transition:all .3s ease;
  word-break:break-all;
}

.address.show {
  opacity:1;
}

.copy {
  margin-top:10px;
  font-size:12px;
  border:1px solid #F97316;
  color:#F97316;
  padding:8px 16px;
  background:transparent;
  border-radius:2px;
  opacity:0;
  transition:all .2s ease;
}

.copy.show {
  opacity:1;
}

.copy:active {
  transform:scale(0.95);
}

.copy.done {
  background:#F97316;
  color:#fff;
}
</style>
</head>

<body>

<div class="stage">

  <!-- minimal fox -->
  <svg class="fox" viewBox="0 0 100 100">
    <polygon points="50,10 90,80 10,80" fill="#F97316"/>
    <circle cx="35" cy="55" r="4" fill="#111"/>
    <circle cx="65" cy="55" r="4" fill="#111"/>
  </svg>

  <div id="chat" class="chat"></div>

  <div id="hint" class="hint">tap →</div>

  <div id="address" class="address"></div>
  <button id="copyBtn" class="copy">copy</button>

</div>

<script>
const ADDR = "D2tHP8E4ckTr3hq7sJiM6aHsMHTj4BPFUECecs7hWmx3";

const lines = [
  "what’s up.",
  "you found me.",
  "not many do.",
  "this is a solana address.",
  "if you want to send something...",
  "i’ll give it to you."
];

const chat = document.getElementById("chat");
const hint = document.getElementById("hint");
const addressEl = document.getElementById("address");
const copyBtn = document.getElementById("copyBtn");

let step = 0;

/* add line */
function addLine(text) {
  const el = document.createElement("div");
  el.className = "line";
  el.textContent = text;
  chat.appendChild(el);

  setTimeout(() => el.classList.add("show"), 20);

  // fade previous lines
  const all = document.querySelectorAll(".line");
  all.forEach((l, i) => {
    if (i < all.length - 1) l.classList.add("old");
  });
}

/* tap handler */
document.body.addEventListener("click", () => {

  if (step < lines.length) {
    addLine(lines[step]);
    step++;

    if (step === 1) {
      document.body.classList.add("engaged");
    }

    if (step === lines.length) {
      setTimeout(showFinal, 400);
    }

  }

});

function showFinal() {
  hint.textContent = "";

  addressEl.textContent = ADDR;
  addressEl.classList.add("show");

  copyBtn.classList.add("show");
}

/* copy */
copyBtn.addEventListener("click", (e) => {
  e.stopPropagation();

  navigator.clipboard.writeText(ADDR).then(() => {
    copyBtn.textContent = "copied.";
    copyBtn.classList.add("done");
  });
});
</script>

</body>
</html>
